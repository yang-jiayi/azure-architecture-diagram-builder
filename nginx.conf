server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy API endpoints (speech token + Azure OpenAI proxy) to the local
    # Node.js token server (never exposed externally).
    #
    # Long timeouts: the /api/openai proxy waits on Azure OpenAI, which for
    # large prompts on reasoning/slower models (GPT-5.4, grok, kimi, high
    # reasoning effort) can take well over nginx's 60s default — which surfaced
    # as intermittent "504 Gateway Time-out" errors (worse on 2nd+ refinements
    # as context grows). 300s comfortably covers real model latency.
    #
    # client_max_body_size 12m matches the token server's body limit so vision
    # requests that embed base64 images aren't rejected with 413.
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 12m;
    }

    # MCP HTTP transport — streamable HTTP + SSE.
    # Buffering off and long read timeout because the streamable transport
    # holds open SSE connections; HTTP/1.1 with no Connection upgrade so the
    # mcp-session-id header round-trips correctly.
    location = /mcp {
        proxy_pass http://127.0.0.1:3030/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding on;
    }

    # MCP health probe (proxies to the MCP server's /healthz).
    location = /mcp/healthz {
        proxy_pass http://127.0.0.1:3030/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
